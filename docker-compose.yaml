# nginx proxy address - http://172.17.0.1:8093

name: screenly
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  screenly:
    image: screenly/screenly-ose:latest
    pull_policy: always
    container_name: screenly-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - screenly
    ports:
      - "172.17.0.1:8093:8080"
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./volumes/config/screenly:/config
      - ./volumes/data/screenly:/data

networks:
  screenly:
    name: screenly
    external: false
